# XAiWebHook 默认配置
# 本文件首次启动时自动生成。修改后执行 /xwebhook reload 即可热重载，无需重启 mirai。
# 所有 ${...} 表达式仅做变量替换与基础条件判断，不会执行任意脚本。

# HTTP 服务（接收外部 incoming 请求）相关设置
server:
  # 是否启动 HTTP 服务，false 时仅 outgoing 转发可用
  enabled: true
  # 监听地址。默认仅监听本机；需要接收外部请求时改为 "0.0.0.0"，
  # 并务必配置强 token（auth.tokens），避免接口在公网裸奔
  host: "127.0.0.1"
  # 监听端口，取值范围 1-65535
  port: 18080
  # 所有 incoming 端点的统一路径前缀，最终路径 = base_path + 端点 path
  base_path: "/webhook"

# incoming 请求鉴权设置
auth:
  # 鉴权类型，目前仅支持 "bearer"；其它值会导致所有请求被拒
  type: "bearer"
  # 全局 Bearer Token 列表。端点未单独配置 tokens 时回退到此处。
  # 生产环境务必替换默认值，使用足够长的随机串
  tokens:
    - "change-me-token"
  # 为 true 时允许无 token 端点，但仅放行来自回环地址的请求
  # （127.0.0.0/8 网段、localhost、::1 等）。绑定非回环 host 时开启会触发安全告警
  allow_empty_for_localhost: false

# 表达式模板设置
templates:
  # 是否启用 ${...} 表达式。为 false 时模板原样输出
  enable_expressions: true
  # 未解析到变量时的处理：true 保留原始 ${...} 文本，false 替换为空串
  strict_missing_variables: false

# 浏览器自动化设置，用于 send_webpage_screenshot 动作
browser:
  # 浏览器动作总开关，默认 false；启用截图动作前必须改为 true
  enabled: true
  # 浏览器引擎，可选 chromium、firefox、webkit；使用 Edge/Chrome channel 时必须为 chromium
  engine: "chromium"
  # 浏览器发行通道。Windows 可用 msedge 复用系统 Edge；留空则使用 Playwright 默认浏览器
  channel: "msedge"
  # 自定义浏览器可执行文件路径，默认留空；配置后优先于 channel
  executable_path: ""
  # 是否无界面运行，默认 true；调试登录流程时可临时改为 false
  headless: true
  # 浏览器视口宽度，默认 1440，范围 320-7680
  viewport_width: 1440
  # 浏览器视口高度，默认 1000，范围 240-4320
  viewport_height: 1000
  # 浏览器步骤与导航默认超时（毫秒），默认 30000，范围 1000-300000
  timeout_ms: 30000
  # optional 步骤查找元素的最大等待时间（毫秒），默认 1000，范围 100-30000
  optional_step_timeout_ms: 1000
  # 是否持久化 session_key 对应的 Cookie/localStorage，省略时默认 false；
  # 缓存含敏感登录态，默认保持关闭；确需跨 reload/重启恢复登录时再启用并限制目录访问权限
  session_cache_enabled: false
  # 会话缓存目录，默认 browser-session-cache；相对路径基于插件配置目录，文件名使用 session_key 哈希
  session_cache_dir: "browser-session-cache"
  # 允许主页面访问的域名列表；支持精确域名和 *.example.com 子域通配，不能为空
  allowed_hosts:
    - "hk.geek2api.com"
    - "hk2.geek2api.com"
    - "hk4.geek2api.com"
    - "hk5.geek2api.com"
  # 单张截图最大字节数，默认 10485760（10 MiB），范围 1024-52428800
  max_screenshot_bytes: 10485760

# 安全相关设置
security:
  # 命令执行全局开关。execute_command 动作需同时开启此项与动作自身 enabled 才会执行
  allow_command_execution: false
  # incoming 请求体最大字节数，超限返回 413；0 表示不限制
  max_body_bytes: 1048576

# 日志设置
logging:
  # 是否记录 incoming/outgoing 请求日志
  request: true
  # 是否记录 incoming 响应日志
  response: true
  # 是否记录错误堆栈
  error_stacktrace: true
  # 是否输出调试日志（各功能节点的详细 println，含配置/请求/动作/事件全过程）。
  # 默认 false；排查问题时开启，会在控制台打印大量信息，生产环境建议关闭
  debug: false

# incoming：外部 HTTP 请求触发机器人动作
incoming:
  # 端点列表。每个端点：id 标识、enabled 是否启用、method 请求方法、
  # path 相对 base_path 的子路径、tokens 端点专属 token（为空回退全局）、actions 命中后依次执行的动作
  endpoints:
    - id: "send-group"
      enabled: true
      method: "POST"
      path: "/send-group"
      actions:
        # 发送群消息：group_id 必填且需可解析为数字；message 支持模板，单个 request.body 变量超过 200 字符时会渲染为 Markdown 图片
        - type: "send_group_message"
          group_id: "${request.body.group_id}"
          # at 为目标 QQ，可填单个数字、字符串或列表；为空列表时不 @；仅群消息有效，会生成真正的 Mirai At
          at: []
          # at_all 是否 @全体成员，默认 false；仅群消息有效，需机器人在群内有对应权限
          at_all: false
          # parse_mirai_code 是否将 message 按 MiraiCode 解析，默认 false；开启后可写 [mirai:at:123456]、[mirai:atall] 等
          parse_mirai_code: false
          # mirai_code 可替代 message，填写后会自动按 MiraiCode 解析；示例："[mirai:at:${request.body.target_qq}] ${request.body.message ?: \"\"}"
          # mirai_code: "[mirai:at:${request.body.target_qq}] ${request.body.message ?: \"\"}"
          message: "${request.body.message ?: \"\"}"
        # reply 构造 HTTP 响应：status 状态码（默认 200），body 任意结构
        - type: "reply"
          status: 200
          body:
            success: true
            message: "group message queued"

    - id: "send-friend"
      enabled: true
      method: "POST"
      path: "/send-friend"
      actions:
        # 发送好友消息：friend_id 必填且需可解析为数字；message 支持模板，单个 request.body 变量超过 200 字符时会渲染为 Markdown 图片
        - type: "send_friend_message"
          friend_id: "${request.body.friend_id}"
          # parse_mirai_code 是否将 message 按 MiraiCode 解析，默认 false；好友消息不支持结构化 at 字段
          parse_mirai_code: false
          # mirai_code 可替代 message，填写后会自动按 MiraiCode 解析
          # mirai_code: "${request.body.mirai_code ?: \"\"}"
          message: "${request.body.message ?: \"\"}"
        - type: "reply"
          status: 200
          body:
            success: true
            message: "friend message queued"

    # 同一个网页截图动作也可由 incoming 调用；请求体传 group_id 或 friend_id 指定接收方
    - id: "webpage-screenshot"
      # 默认关闭，启用前需配置 browser、环境变量和目标站点登录步骤
      enabled: false
      method: "POST"
      path: "/webpage-screenshot"
      # actions 动作组单飞控制；未配置 single_flight 时默认关闭
      single_flight:
        # 开启后，上一轮 actions 未全部结束前拒绝下一次触发
        enabled: true
        # 可选共享键；省略时仅当前 endpoint 互斥，相同键可与其他 endpoint/route 共同互斥
        key: "geek2api-monitor-screenshot"
        # 忙碌时是否返回自定义 message；incoming 无论该值如何都会返回 HTTP 409
        notify: true
        # 支持当前 request/event 模板变量；空字符串可只返回通用 action group busy 错误
        message: "Geek2Api 监控截图任务正在执行，请等待完成后再试。"
      actions:
        - ref: "geek2api-monitor-screenshot"
        - type: "reply"
          status: 200
          body:
            success: true
            message: "webpage screenshot sent"

# outgoing：mirai 消息事件转发到外部 WebHook
outgoing:
  # 路由列表。events/groups/friends/senders/message/condition 之间为「与」关系，未配置的条件跳过；
  # message 内的 contains/starts_with/ends_with/regex 四类之间为「或」关系，任意一项命中即通过文本匹配。
  # single_flight、cooldown 与 actions 在路由匹配通过后依次处理。
  routes:
    - id: "group-message-forward"
      # 示例路由默认关闭，启用前请先填入真实 URL
      enabled: false
      events: ["group_message"]
      groups: [123456789]
      message:
        # contains/starts_with/ends_with/regex 四类均为列表，所有已配置项之间为「或」关系
        contains: ["关键词"]
      actions:
        # http_request：向外部发起 HTTP 请求。method 默认 POST，
        # headers 为键值对，body 任意结构（序列化为 JSON）
        - type: "http_request"
          method: "POST"
          url: "https://example.invalid/webhook/group-message"
          headers:
            Authorization: "Bearer change-me-token"
          body:
            type: "${event.type}"
            bot_id: "${event.botId}"
            group_id: "${event.groupId}"
            sender_id: "${event.senderId}"
            sender_name: "${event.senderName}"
            message: "${event.messageText}"

    # 群成员发送“监控截图”时执行网页登录与截图动作，并自动把图片发回当前群
    - id: "geek2api-monitor-command"
      # 默认关闭；启用前需同时开启 browser.enabled 和下方命名动作
      enabled: false
      events: ["group_message"]
      # 使用占位群号，生产环境替换为允许触发截图的群；留空表示不限制群
      groups: [123456789]
      message:
        # 任意满足即触发：消息包含“炸了么”，或以“状态检查”/“监控截图”开头
        contains: ["炸了么"]
        starts_with: ["状态检查", "监控截图"]
      # 动作组单飞在 actions 执行期间持续生效；与 incoming 使用同一 key，避免重复截图
      single_flight:
        # 开启后，上一轮 actions 未全部结束前拒绝下一次触发；未配置区块时默认关闭
        enabled: true
        # 可选共享键；省略时仅按当前 route.id 互斥，相同键可跨 endpoint/route 共同互斥
        key: "geek2api-monitor-screenshot"
        # 被拦截时是否向当前群或好友发送提示，默认 true
        notify: true
        # 提示支持当前 event 模板变量；空字符串可静默拦截
        message: "Geek2Api 监控截图任务正在执行，请等待完成后再试。"
      # 指令冷却仅作用于本路由；未配置 cooldown 时完全不启用
      cooldown:
        # 冷却开关；配置了 cooldown 区块时默认 true
        enabled: true
        # 普通用户个人冷却（毫秒），按发送者 QQ 独立计时；默认 0，范围 0-604800000
        personal_ms: 60000
        # 群管理员/群主或插件管理员的个人冷却（毫秒）；默认继承 personal_ms，范围 0-604800000
        administrator_ms: 10000
        # 本路由所有未绕过用户共享的全局冷却（毫秒）；默认 0，范围 0-604800000
        global_ms: 5000
        # 被冷却拦截时是否向当前群或好友发送提示，默认 true
        notify: true
        # 提示支持 cooldown.routeId/scope/remainingMillis/remainingSeconds 变量
        message: "监控截图指令冷却中，请在 ${cooldown.remainingSeconds} 秒后重试。"
      actions:
        - ref: "geek2api-monitor-screenshot"

    - id: "friend-message-forward"
      enabled: false
      events: ["friend_message"]
      actions:
        - type: "http_request"
          method: "POST"
          url: "https://example.invalid/webhook/friend-message"
          body:
            type: "${event.type}"
            bot_id: "${event.botId}"
            friend_id: "${event.friendId}"
            sender_id: "${event.senderId}"
            sender_name: "${event.senderName}"
            message: "${event.messageText}"

# actions：可复用的命名动作，incoming/outgoing 可用字符串名或 ref 引用
actions:
  # Geek2Api 监控页面截图示例；首次使用 CLI Bridge 打开系统浏览器授权，后续自动刷新登录态
  geek2api-monitor-screenshot:
    type: "send_webpage_screenshot"
    # 默认关闭；启用前需同时设置 browser.enabled: true，并确保 mirai 所在系统可打开默认浏览器
    enabled: true
    # 登录会话复用键；相同键复用 token/Cookie/localStorage，开启 browser.session_cache_enabled 后可跨 reload/重启恢复
    session_key: "geek2api-monitor"
    # Geek2Api base URL candidates; the current URL is sticky and switches only after a request/navigation error
    # URLs using one of these origins keep their path/query and switch to the active candidate origin at runtime
    # hk5 is primary; hk, hk2 and hk4 are fallbacks; hk3 is expired and not configured
    base_urls:
      - "https://hk5.geek2api.com"
      - "https://hk.geek2api.com"
      - "https://hk2.geek2api.com"
      - "https://hk4.geek2api.com"
    # incoming 可通过请求体指定群号；outgoing 中变量为空时自动回退到触发事件所在会话
    group_id: "${request.body.group_id}"
    # incoming 可通过请求体指定好友号；group_id 和 friend_id 不能同时有效
    friend_id: "${request.body.friend_id}"
    # 首次触发会打开系统浏览器，用户须在 5 分钟内完成登录授权；内存或磁盘缓存仍有效时不会重复打开
    pending_message: "正在获取监控截图..."
    # 截图失败时发送给聊天用户的脱敏提示，内部详细原因仅写控制台日志
    failure_message: "监控页面截图失败，请稍后重试。"
    # 图片前的可选说明文字，留空时只发送图片
    message: ""
    # CLI Bridge 与 token/token_env、login 三种认证源必须且只能配置一种
    auth:
      cli_bridge:
        # 创建 300 秒桥接会话，请求体固定为 {}
        start_url: "https://hk5.geek2api.com/api/v1/auth/cli-bridge/start"
        # 系统浏览器授权页；插件只附加 bridge_id，绝不会把 poll_secret 放入 URL
        browser_url: "https://hk5.geek2api.com/cli-bridge"
        # 轮询授权结果，请求体为 bridge_id + poll_secret；token 只会交付一次
        poll_url: "https://hk5.geek2api.com/api/v1/auth/cli-bridge/poll"
        # 取得 token 后读取当前用户，补齐前端路由守卫要求的 auth_user
        profile_url: "https://hk5.geek2api.com/api/v1/user/profile"
        # access token 临近过期时提交 refresh_token，并覆盖旋转后的 token pair
        refresh_url: "https://hk5.geek2api.com/api/v1/auth/refresh"
        # 轮询间隔默认 2500 毫秒，范围 2000-30000，避免触发 120 次/分钟限流
        poll_interval_ms: 2500
        # 单次授权最多等待 300000 毫秒，且不会超过 start 返回的 expires_in
        max_wait_ms: 300000
        # access token 到期前 120 秒刷新，范围 0-3600
        refresh_before_expiry_seconds: 120
        # 授权失败后 60 秒内不重新 start，避免触发 20 次/分钟限流
        retry_cooldown_ms: 60000
      # 授权成功后按 Geek2Api 前端约定写入四个 localStorage 键
      local_storage:
        # 必须是 browser.allowed_hosts 中的无路径 origin
        origin: "https://hk5.geek2api.com"
        # access_token 写入的键名
        key: "auth_token"
        # access token 前缀，Geek2Api 使用原始 token，因此留空
        prefix: ""
        # refresh_token 写入的键名
        refresh_token_key: "refresh_token"
        # 当前时间 + expires_in 写入的毫秒时间戳键名
        expires_at_key: "token_expires_at"
        # profile 用户对象序列化后的键名
        user_key: "auth_user"
    # CLI Bridge 登录在真实系统浏览器完成，可使用账号密码、OAuth、验证码和网页 2FA
    # 每个截图项使用独立 Page，但共享同一 BrowserContext 中的 Cookie、localStorage 和 token
    screenshot:
      # 截图项列表，按配置顺序从上到下拼接；默认至少 1 项、最多 16 项
      # 每项支持 id、enabled、url、wait_until、steps、selector、timeout_ms、delay_before_ms、font_wait_timeout_ms、hide_selectors
      parts:
        # 第一项：从 /keys 截取运行概览，放在最终图片顶部
        - id: "keys-overview"
          # 单项开关，默认 true；false 时整项跳过，至少需保留一个启用项
          enabled: true
          # 可选导航快捷方式；会生成首个 goto 步骤，并随 base_urls 保留路径切换候选域名
          url: "https://hk5.geek2api.com/keys"
          # url 导航等待阶段，默认 commit；可选 commit/domcontentloaded/load/networkidle
          wait_until: "commit"
          # 最终元素定位器，支持 CSS 或 XPath；截图前会自动等待 visible
          selector: '//*[@id="app"]/div[2]/div[2]/main/div/div[1]/div/section/div[2]'

        # 第二项：从 /monitor 截取监控状态卡片，拼接在运行概览下方
        - id: "monitor-status"
          enabled: true
          url: "https://hk5.geek2api.com/monitor"
          wait_until: "commit"
          # url 导航后按顺序执行的受限步骤，支持 goto/fill/click/wait/wait_url；总计最多 32 步
          steps:
            # 主区域在骨架屏阶段已经可见，只用于确认页面挂载
            - op: "wait"
              selector: '//*[@id="app"]/div[2]/div[2]/main'
              state: "visible"
            # 真实卡片或合法空状态出现时，Vue 已结束首次数据加载
            - op: "wait"
              selector: "(//*[@id='app']/div[2]/div[2]/main//button[@type='button' and contains(concat(' ', normalize-space(@class), ' '), ' group ') and contains(concat(' ', normalize-space(@class), ' '), ' min-h-[280px] ')] | //*[@id='app']/div[2]/div[2]/main//div[contains(concat(' ', normalize-space(@class), ' '), ' empty-state ')])[1]"
              state: "visible"
              timeout_ms: 90000
          selector: '//*[@id="app"]/div[2]/div[2]/main'

      # 以下四项是所有 parts 的默认值；单项配置同名字段时覆盖默认值
      # 每项完成 URL 导航和 steps 后、等待 selector 并截图前的固定等待，单位毫秒；默认 0，范围 0-300000
      # 此处设为 3000，因此第一项和后续项都会等待 3 秒；单项可配置 delay_before_ms: 0 跳过
      delay_before_ms: 3000
      # 截图元素等待与截图操作超时，单位毫秒；默认回退 browser.timeout_ms，范围 100-300000
      timeout_ms: 60000
      # 截图前等待网页字体完成加载的最长时间；默认 3000 且不超过 timeout_ms，0 表示不等待
      font_wait_timeout_ms: 60000
      # 截图瞬间临时隐藏的 CSS selector 列表，最多 32 项；单项可配置自己的列表替换此默认值
      hide_selectors: ["header.sticky"]
      # 纵向合成布局；未配置 layout 时默认居中且无间距
      layout:
        # 宽度不同时的水平对齐方式：left、center、right，默认 center
        horizontal_align: "center"
        # 相邻截图项之间的透明间距像素，默认 0，范围 0-1000
        gap_px: 0
      # 任一截图项步骤或截图发生可重试错误时，重新执行完整 parts 列表
      retry:
        # 重试开关；未配置 retry 区块时默认关闭，配置区块后默认 true
        enabled: true
        # 首次失败后的最大额外重试次数，默认 2，范围 0-10；2 表示最多共尝试 3 次
        max_retries: 2
        # 两次尝试之间的固定等待时间（毫秒），默认 1000，范围 0-60000
        delay_ms: 1000

  # 命令执行动作示例，默认 enabled: false 且需开启 security.allow_command_execution 才会执行
  disabled-command-example:
    type: "execute_command"
    enabled: false
