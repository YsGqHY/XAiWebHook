# XAiWebHook 完整实例：Geek2Api CLI Bridge 监控截图
#
# 使用前必须完成：
# 1. 将 change-me-incoming-token 替换为强随机 Bearer Token。
# 2. 将群号、好友号、发送者 QQ 占位符替换为实际允许值。
# 3. Windows 默认复用系统 Edge；其它平台需修改 browser.channel 或 executable_path。
# 4. 确保 mirai 所在桌面系统可以打开默认浏览器；首次截图会要求在 5 分钟内完成 Geek2Api 授权。
# 5. CLI Bridge 登录发生在真实系统浏览器，可正常使用账号密码、OAuth、验证码和网页 2FA。

# HTTP incoming 服务
server:
  # 是否启动 HTTP 服务；仅使用 outgoing 时可设为 false
  enabled: true
  # 默认仅监听本机；需要局域网访问时可改为 0.0.0.0，但必须使用强 Token
  host: "127.0.0.1"
  # 监听端口，范围 1-65535
  port: 18080
  # incoming 端点统一前缀
  base_path: "/webhook"

# incoming Bearer Token 鉴权
auth:
  # 当前仅支持 bearer
  type: "bearer"
  # 调用 incoming API 时使用：Authorization: Bearer change-me-incoming-token
  tokens:
    - "change-me-incoming-token"
  # 是否允许回环地址无 Token 调用，生产环境建议保持 false
  allow_empty_for_localhost: false

# 模板表达式
templates:
  # 启用 ${request...} 与 ${event...} 模板
  enable_expressions: true
  # 变量不存在时替换为空字符串，便于同一 action 同时复用 incoming/outgoing
  strict_missing_variables: false

# 浏览器运行时
browser:
  # send_webpage_screenshot 总开关
  enabled: true
  # 可选 chromium、firefox、webkit；Edge/Chrome channel 使用 chromium
  engine: "chromium"
  # Windows 默认复用系统 Edge；使用 Playwright Chromium 时留空
  channel: "msedge"
  # 自定义浏览器路径；配置后优先于 channel，默认留空
  executable_path: ""
  # 仅控制 Playwright 截图浏览器；CLI Bridge 授权仍会打开可见的系统默认浏览器
  headless: true
  # 页面视口尺寸
  viewport_width: 1440
  viewport_height: 1000
  # 浏览器步骤默认超时，单位毫秒
  timeout_ms: 30000
  # optional 步骤查找元素的等待时间，单位毫秒
  optional_step_timeout_ms: 1000
  # 持久化 session_key 的 Cookie/localStorage，跨 reload 和进程重启免重复授权；缓存含敏感登录态
  session_cache_enabled: true
  # 相对路径基于插件配置目录，默认 browser-session-cache
  session_cache_dir: "browser-session-cache"
  # 只允许访问列出的主页面域名；hk5 为主用，hk/hk2/hk4 为备用
  allowed_hosts:
    - "hk5.geek2api.com"
    - "hk.geek2api.com"
    - "hk2.geek2api.com"
    - "hk4.geek2api.com"
  # 单张图片最大 10 MiB
  max_screenshot_bytes: 10485760

# 安全设置
security:
  # 本实例不需要命令执行，保持关闭
  allow_command_execution: false
  # incoming 请求体最大 1 MiB
  max_body_bytes: 1048576

# 日志设置
logging:
  # 记录 incoming/outgoing 调用摘要
  request: true
  # 记录 incoming 响应摘要
  response: true
  # 记录错误堆栈
  error_stacktrace: true
  # 排障时可临时开启；生产环境建议 false
  debug: false

# incoming：外部系统通过 HTTP 请求截图
incoming:
  endpoints:
    - id: "geek2api-monitor-screenshot"
      enabled: true
      method: "POST"
      # 完整地址：http://127.0.0.1:18080/webhook/geek2api-monitor
      path: "/geek2api-monitor"
      # 未配置端点 tokens，因此使用 auth.tokens
      # 与两个 outgoing 路由共享单飞键：任一截图未完成时，其他入口返回 HTTP 409 或聊天提示
      single_flight:
        enabled: true
        key: "geek2api-monitor-screenshot"
        notify: true
        message: "Geek2Api 监控截图任务正在执行，请等待完成后再试。"
      actions:
        # 请求体传 group_id 或 friend_id，不能同时传两个
        - ref: "geek2api-monitor-screenshot"
        - type: "reply"
          status: 200
          body:
            success: true
            message: "Geek2Api monitor screenshot sent"

# outgoing：群/好友消息触发截图
outgoing:
  routes:
    # 指定群、指定发送者发送“监控截图”时，将图片自动发回当前群
    - id: "geek2api-monitor-group-command"
      enabled: true
      events: ["group_message"]
      # 替换为允许使用该功能的群号
      groups: [123456789]
      # 替换为允许触发的管理员 QQ；如不限制发送者可改为空列表 []
      senders: [123456789]
      message:
        # 四类文本规则之间为“或”：包含“炸了么”，或以“状态检查”/“监控截图”开头均触发
        contains: ["炸了么"]
        starts_with: ["状态检查", "监控截图"]
      # actions 未完成前禁止 incoming、群聊和好友入口再次触发同一截图任务
      single_flight:
        enabled: true
        key: "geek2api-monitor-screenshot"
        notify: true
        message: "Geek2Api 监控截图任务正在执行，请等待完成后再试。"
      # 冷却按当前路由隔离：普通成员 60 秒、管理员 10 秒，所有未绕过用户共享 5 秒全局冷却
      cooldown:
        enabled: true
        # 普通用户按发送者 QQ 独立计时，范围 0-604800000 毫秒
        personal_ms: 60000
        # 群管理员/群主或持有插件 admin 权限的用户使用此时长
        administrator_ms: 10000
        # 本路由所有未绕过用户共享；获授权管理员不会读取或写入冷却状态
        global_ms: 5000
        # 为 true 时在当前会话提示剩余时间
        notify: true
        message: "监控截图指令冷却中，请在 ${cooldown.remainingSeconds} 秒后重试。"
      actions:
        - ref: "geek2api-monitor-screenshot"

    # 指定好友发送“监控截图”时，将图片自动发回该好友
    - id: "geek2api-monitor-friend-command"
      enabled: true
      events: ["friend_message"]
      # 替换为允许使用该功能的好友 QQ
      friends: [123456789]
      message:
        contains: ["监控截图"]
      single_flight:
        enabled: true
        key: "geek2api-monitor-screenshot"
        notify: true
        message: "Geek2Api 监控截图任务正在执行，请等待完成后再试。"
      actions:
        - ref: "geek2api-monitor-screenshot"

# incoming/outgoing 共用的命名动作
actions:
  geek2api-monitor-screenshot:
    type: "send_webpage_screenshot"
    enabled: true

    # 相同 session_key 复用 token/Cookie/localStorage；缓存有效时可跨 reload、停服和进程重启恢复
    session_key: "geek2api-monitor"

    # 同一 Geek2Api 站点的候选基址；当前 URL 成功时保持使用，请求/导航失败时才切换到下一个
    # hk5 为主用，hk、hk2、hk4 为备用；hk3 服务器已到期，不再配置
    base_urls:
      - "https://hk5.geek2api.com"
      - "https://hk.geek2api.com"
      - "https://hk2.geek2api.com"
      - "https://hk4.geek2api.com"

    # incoming 从请求体读取目标；outgoing 中变量为空，会自动回退到触发会话
    group_id: "${request.body.group_id}"
    friend_id: "${request.body.friend_id}"

    # 用户可见消息；内存或磁盘缓存仍有效时不会再次打开授权页
    pending_message: "正在获取 Geek2Api 监控截图；首次使用请在系统浏览器中完成授权..."
    failure_message: "Geek2Api 监控截图失败，请稍后重试。"
    message: "Geek2Api 监控状态：\n"

    # CLI Bridge 登录：start -> 系统浏览器授权 -> poll -> profile -> refresh
    auth:
      cli_bridge:
        # 创建会话，请求体为 {}
        start_url: "https://hk5.geek2api.com/api/v1/auth/cli-bridge/start"
        # 插件只附加 bridge_id；poll_secret 仅保存在本次调用内存中
        browser_url: "https://hk5.geek2api.com/cli-bridge"
        # 每 2.5 秒轮询一次，请求体为 {bridge_id, poll_secret}
        poll_url: "https://hk5.geek2api.com/api/v1/auth/cli-bridge/poll"
        # token 交付后读取用户对象，写入 auth_user
        profile_url: "https://hk5.geek2api.com/api/v1/user/profile"
        # access token 临近过期时刷新并覆盖旋转后的 access/refresh token
        refresh_url: "https://hk5.geek2api.com/api/v1/auth/refresh"
        poll_interval_ms: 2500
        max_wait_ms: 300000
        refresh_before_expiry_seconds: 120
        # 授权失败后 60 秒内不重新 start，避免撞到 20 次/分钟限流
        retry_cooldown_ms: 60000

      # 授权成功后写入与 Geek2Api 前端完全相同的 localStorage 登录态
      local_storage:
        origin: "https://hk5.geek2api.com"
        key: "auth_token"
        prefix: ""
        refresh_token_key: "refresh_token"
        expires_at_key: "token_expires_at"
        user_key: "auth_user"

    # 截图项按列表顺序从上到下合成；每项独立 Page，共享同一登录态
    screenshot:
      parts:
        - id: "keys-overview"
          enabled: true
          url: "https://hk5.geek2api.com/keys"
          wait_until: "commit"
          selector: '//*[@id="app"]/div[2]/div[2]/main/div/div[1]/div/section/div[2]'

        - id: "monitor-status"
          enabled: true
          url: "https://hk5.geek2api.com/monitor"
          wait_until: "commit"
          steps:
            # 主区域在骨架屏阶段已经可见，因此继续等待真实监控卡片或合法空状态
            - op: "wait"
              selector: '//*[@id="app"]/div[2]/div[2]/main'
              state: "visible"
              timeout_ms: 30000
            - op: "wait"
              selector: "(//*[@id='app']/div[2]/div[2]/main//button[@type='button' and contains(concat(' ', normalize-space(@class), ' '), ' group ') and contains(concat(' ', normalize-space(@class), ' '), ' min-h-[280px] ')] | //*[@id='app']/div[2]/div[2]/main//div[contains(concat(' ', normalize-space(@class), ' '), ' empty-state ')])[1]"
              state: "visible"
              timeout_ms: 90000
          selector: '//*[@id="app"]/div[2]/div[2]/main'

      # parts 默认值；单项同名字段可覆盖
      # 每项完成导航和 steps 后、等待 selector 并截图前固定等待 3 秒；第一项同样生效
      delay_before_ms: 3000
      hide_selectors: ["header.sticky"]
      timeout_ms: 30000
      font_wait_timeout_ms: 3000
      layout:
        horizontal_align: "center"
        gap_px: 0
      # 可重试的浏览器超时/网络错误最多额外重试 2 次，共 3 次尝试
      retry:
        enabled: true
        max_retries: 2
        delay_ms: 1000
